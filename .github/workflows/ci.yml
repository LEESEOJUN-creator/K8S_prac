name: CI Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v3

    - name: Docker Hub 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker Buildx 설정
      uses: docker/setup-buildx-action@v3

    - name: 이미지 빌드 및 push
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/my-app:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/my-app:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/my-app:buildcache,mode=max

    - name: deployment.yaml 이미지 태그 업데이트
      run: |
        sed -i "s|${{ secrets.DOCKER_USERNAME }}/my-app:.*|${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}|" \
        k8s/deployment.yaml

    - name: 변경사항 GitHub에 push
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Actions"
        git add k8s/deployment.yaml
        git commit -m "이미지 태그 업데이트: ${{ github.sha }} [skip ci]"
        git push