name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v3

    - name: Docker Hub 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 이미지 빌드
      run: |
        docker build -t \
        ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .

    - name: 이미지 push
      run: |
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

    - name: latest 태그도 push
      run: |
        docker tag \
        ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} \
        ${{ secrets.DOCKER_USERNAME }}/my-app:latest
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/my-app:latest

    - name: deployment.yaml 이미지 태그 업데이트
      run: |
        sed -i "s|${{ secrets.DOCKER_USERNAME }}/my-app:.*|${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}|" \
        k8s/deployment.yaml

    - name: 변경사항 GitHub에 push
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Actions"
        git add k8s/deployment.yaml
        git commit -m "이미지 태그 업데이트: ${{ github.sha }}"
        git push